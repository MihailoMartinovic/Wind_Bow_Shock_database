name: Notebook Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.ipynb'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.ipynb'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbformat nbstripout jupyter

    - name: Validate notebook format
      run: |
        find . -name "*.ipynb" -type f -not -path "./.ipynb_checkpoints/*" | while read nb; do
          echo "Validating $nb..."
          python -m jupyter nbconvert --to notebook "$nb" --output=/dev/null 2>&1 || echo "Invalid notebook: $nb"
        done

    - name: Check for cell outputs
      run: |
        find . -name "*.ipynb" -type f -not -path "./.ipynb_checkpoints/*" | while read nb; do
          # Count cells with output
          outputs=$(grep -c '"outputs"' "$nb" || true)
          if [ $outputs -gt 0 ]; then
            echo "⚠️  Warning: $nb contains cell outputs (consider running nbstripout)"
          fi
        done
      continue-on-error: true
